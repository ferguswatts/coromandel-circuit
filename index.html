var activeIdx=null;
function openCard(idx){
  var d=DAYS[idx];
  var tagLabels={gravel:'Gravel',sealed:'Sealed',trail:'Rail Trail',mtb:'MTB Track'};
  var tags=d.tags.map(function(t){return '<span class="tag tag-'+t+'">'+(tagLabels[t]||t)+'</span>'}).join('');
  var bolt='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>';

  var stayHtml='';
  if(d.stay){
    stayHtml='<div class="card-section"><h4>Where to stay</h4><p>'+d.stay+'</p>';
    if(d.stayLink) stayHtml+='<p style="margin-top:5px"><a href="'+d.stayLink+'" target="_blank">Book \u2192</a>'+(d.stayPhone?' \u00b7 '+d.stayPhone:'')+'</p>';
    stayHtml+='</div>';
  } else if(idx===DAYS.length-1){
    stayHtml='<div class="card-section"><h4>Finish</h4><p>Loop complete. Beers at the Junction Hotel. Drive home.</p></div>';
  }
  var chargingHtml=d.charging?'<div class="card-badge badge-good">'+bolt+'<span>'+d.chargingNote+'</span></div>':'';
  var warnHtml=d.warn?'<div class="card-badge badge-warn">'+warnSvg+'<span>'+d.warn+'</span></div>':'';
  document.getElementById('card').innerHTML=
    '<div class="card-top">'+
      '<div class="card-day" style="background:'+COLORS[idx]+'22;color:'+COLORS[idx]+';border:2px solid '+COLORS[idx]+'44">'+d.day+'</div>'+
      '<div class="card-title"><h2>'+d.from+' \u2192 '+d.to+'</h2><div class="card-date">'+d.date+'</div><div class="card-km">'+d.km+'km</div></div>'+
      '<button class="card-close" onclick="closeCard()">\u00d7</button>'+
    '</div>'+
    '<div class="card-body">'+
      '<div class="card-tags">'+tags+'</div>'+
      '<div class="card-section"><h4>Route</h4><p>'+d.route+'</p></div>'+

      '<div class="card-nav">'+

    else l.setStyle({opacity:0.12,weight:3});
  });
  var s=SEGS[idx],e=SEGS[idx+1]||ROUTE.length-1;
  var coords=ROUTE.slice(s,e+1);
  if(coords.length>1) map.fitBounds(L.latLngBounds(coords),{padding:[60,80],maxZoom:13});
  activeIdx=idx;
}
function closeCard(){
  document.getElementById('overlay').classList.remove('visible');
  segLayers.forEach(function(l){l.setStyle({opacity:0.6,weight:4})});
  map.fitBounds(L.latLngBounds(ROUTE),{padding:[40,40]});
  activeIdx=null;
}
document.addEventListener('keydown',function(e){
  if(e.key==='Escape') closeCard();
  if(activeIdx!==null && e.key==='ArrowRight' && activeIdx<DAYS.length-1) openCard(activeIdx+1);
  if(activeIdx!==null && e.key==='ArrowLeft' && activeIdx>0) openCard(activeIdx-1);
});
setTimeout(function(){map.fitBounds(L.latLngBounds(ROUTE),{padding:[40,40]})},100);
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
var pdfPageEls=[];
function renderPDF(){
  var container=document.getElementById('pdfCanvas');
  pdfjsLib.getDocument('coromandel-trip-guide.pdf').promise.then(function(pdf){
    container.innerHTML='';
    var total=pdf.numPages;
    function renderPage(n){
      if(n>total)return;
      pdf.getPage(n).then(function(page){
        var wrap=document.createElement('div');
        wrap.id='pdf-page-'+n;
        wrap.style.marginBottom='2px';
        var canvas=document.createElement('canvas');
        var vp=page.getViewport({scale:1});
        var scale=container.clientWidth/vp.width;
        var svp=page.getViewport({scale:scale});
        canvas.width=svp.width;canvas.height=svp.height;
        wrap.appendChild(canvas);container.appendChild(wrap);
        pdfPageEls[n]=wrap;
        page.render({canvasContext:canvas.getContext('2d'),viewport:svp}).promise.then(function(){renderPage(n+1);});
      });
    }
    renderPage(1);
  });
}
function goToPage(n){
  var el=document.getElementById('pdf-page-'+n);
  if(el){document.getElementById('pdf-scroll').scrollTop=el.offsetTop;}
}
renderPDF();
